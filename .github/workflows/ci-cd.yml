name: CI - Build and Push Docker Image

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd app
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          cd app
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Security scan with bandit
        run: |
          pip install bandit
          cd app
          bandit -r . -f json -o bandit-report.json || true
          bandit -r . || true

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    # 仅在 push 事件时构建和推送镜像，PR 只跑 test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=sha-${{ steps.sha.outputs.short }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Copy compose file to server
        run: |
          scp -o StrictHostKeyChecking=no docker-compose.swarm.yml Caddyfile ${{ secrets.SSH_USER }}@${{ secrets.SWARM_MANAGER_IP }}:/opt/chat-app/

      - name: Deploy to Docker Swarm
        env:
          SWARM_MANAGER_IP: ${{ secrets.SWARM_MANAGER_IP }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no ${{ env.SSH_USER }}@${{ env.SWARM_MANAGER_IP }} bash -s << 'DEPLOY_SCRIPT'
            set -e
            mkdir -p /opt/chat-app
            cd /opt/chat-app

            # 写入应用环境变量文件
            cat > .env << 'ENVEOF'
          API_KEY=${{ secrets.API_KEY }}
          DB_PATH=/data/chat.db
          MODEL_NAME=${{ secrets.MODEL_NAME }}
          LLM_API_URL=${{ secrets.LLM_API_URL }}
          CLERK_PUBLISHABLE_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
          CLERK_FRONTEND_API=${{ secrets.CLERK_FRONTEND_API }}
          ENVEOF

            # 动态修改 config 名称（每次部署唯一），解决 Swarm config 不可变问题
            # 这样就不需要 docker stack rm，避免丢失 Caddy 证书
            CONFIG_NAME="caddy_config_${{ steps.sha.outputs.short }}"
            sed -i "s/caddy_config/${CONFIG_NAME}/g" docker-compose.swarm.yml

            # 设置镜像相关的环境变量（用于 docker stack deploy 替换 compose 文件中的变量）
            export DOCKER_REGISTRY="${{ env.REGISTRY }}"
            export DOCKER_IMAGE_OWNER="${{ github.repository_owner }}"
            export DOCKER_IMAGE_NAME=$(echo "${{ env.IMAGE_NAME }}" | cut -d'/' -f2)
            export IMAGE_TAG="sha-${{ steps.sha.outputs.short }}"

            # 登录容器仓库
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

            # 用 export 的变量替换 compose 文件并部署
            # docker stack deploy 不读取 .env，所以必须 export
            docker stack deploy -c docker-compose.swarm.yml chat-app --with-registry-auth

            # 等待更新完成
            sleep 15

            # 清理旧的不再使用的 config（正在使用的删不掉，忽略错误）
            docker config ls --quiet 2>/dev/null | while read cfg_id; do
              docker config rm "$cfg_id" 2>/dev/null || true
            done || true

            docker service ls
            docker service ps chat-app_web --no-trunc 2>/dev/null || true
          DEPLOY_SCRIPT
