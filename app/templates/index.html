<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 聊天服务</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Clerk JS SDK -->
  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="{{ clerk_publishable_key }}"
    src="https://{{ clerk_publishable_key | replace('pk_test_', '') | replace('pk_live_', '') | replace('_', '.') }}/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
    type="text/javascript">
  </script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f4f7fb;
      color: #1f2937;
      height: 100vh;
      overflow: hidden;
    }

    .layout {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    .sidebar {
      width: 300px;
      min-width: 240px;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      transition: transform 0.25s ease;
      z-index: 20;
    }

    .sidebar-header {
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .sidebar-header h2 {
      margin: 0;
      font-size: 17px;
      font-weight: 600;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
    }

    .btn-primary {
      background: #2563eb;
      color: #fff;
    }

    .conversation-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .conversation-item {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      cursor: pointer;
    }

    .conversation-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .conversation-item.active {
      border-color: #60a5fa;
      background: rgba(37, 99, 235, 0.25);
    }

    .conversation-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      flex: 1;
    }

    .delete-btn {
      border: none;
      background: transparent;
      color: #fca5a5;
      cursor: pointer;
      font-size: 14px;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: relative;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid #e5e7eb;
      background: #fff;
    }

    .menu-btn {
      display: none;
      border: none;
      background: #eef2ff;
      color: #1e40af;
      border-radius: 8px;
      width: 34px;
      height: 34px;
      cursor: pointer;
      font-size: 18px;
    }

    .chat-title {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
      flex: 1;
    }

    .user-area {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #e5e7eb;
    }

    .user-name {
      font-size: 13px;
      color: #6b7280;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .logout-btn {
      border: none;
      background: #fee2e2;
      color: #dc2626;
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 12px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message {
      max-width: 78%;
      padding: 12px 14px;
      border-radius: 14px;
      line-height: 1.6;
      word-break: break-word;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.05);
    }

    .message.user {
      align-self: flex-end;
      background: #2563eb;
      color: #fff;
      border-bottom-right-radius: 6px;
    }

    .message.assistant {
      align-self: flex-start;
      background: #fff;
      color: #111827;
      border-bottom-left-radius: 6px;
      border: 1px solid #e5e7eb;
    }

    .message.assistant p { margin: 0.4em 0; }
    .message.assistant pre {
      background: #0b1020;
      color: #e5e7eb;
      padding: 10px;
      border-radius: 8px;
      overflow-x: auto;
    }

    .composer {
      border-top: 1px solid #e5e7eb;
      padding: 12px;
      background: #fff;
    }

    .composer-inner {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 980px;
      margin: 0 auto;
    }

    textarea {
      flex: 1;
      resize: none;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 12px;
      min-height: 46px;
      max-height: 180px;
      font-size: 14px;
      line-height: 1.5;
      outline: none;
    }

    textarea:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .send-btn {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 10px;
      height: 44px;
      min-width: 90px;
      cursor: pointer;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .send-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .loader {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.6);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    .send-btn.loading .loader {
      display: inline-block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 登录弹窗 */
    .login-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-modal {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    }

    .login-modal h2 {
      margin: 0 0 16px 0;
      text-align: center;
      font-size: 20px;
    }

    #clerk-signin-target {
      min-height: 280px;
    }

    .overlay {
      display: none;
    }

    @media (max-width: 860px) {
      .menu-btn { display: inline-flex; }
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        transform: translateX(-100%);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.35);
        z-index: 10;
      }
      .overlay.show {
        display: block;
      }
      .message { max-width: 92%; }
      .user-name { display: none; }
    }
  </style>
</head>
<body>
<div class="layout" id="appLayout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>对话列表</h2>
      <button class="btn btn-primary" id="newConversationBtn">+ 新建</button>
    </div>
    <div class="conversation-list" id="conversationList"></div>
  </aside>

  <div class="overlay" id="overlay"></div>

  <main class="main">
    <div class="topbar">
      <button class="menu-btn" id="menuBtn">☰</button>
      <h1 class="chat-title" id="chatTitle">AI 聊天</h1>
      <div class="user-area" id="userArea">
        <!-- 登录状态显示头像和注销按钮 -->
      </div>
    </div>

    <section class="messages" id="messages">
      <div style="text-align:center;padding-top:40px;color:#9ca3af;font-size:15px;">
        请先登录以开始使用
      </div>
    </section>

    <div class="composer">
      <div class="composer-inner">
        <textarea id="messageInput" placeholder="输入消息，回车发送，Shift+回车换行" disabled></textarea>
        <button class="send-btn" id="sendBtn" disabled>
          <span class="loader"></span>
          <span>发送</span>
        </button>
      </div>
    </div>
  </main>
</div>

<!-- 登录弹窗 -->
<div class="login-modal-overlay" id="loginModal" style="display:none;">
  <div class="login-modal">
    <h2>欢迎回来</h2>
    <div id="clerk-signin-target"></div>
  </div>
</div>

<script>
  // ══════════════════════════════════════════════════════════════
  // 全局变量
  // ══════════════════════════════════════════════════════════════
  const conversationListEl = document.getElementById('conversationList');
  const messagesEl = document.getElementById('messages');
  const messageInputEl = document.getElementById('messageInput');
  const sendBtnEl = document.getElementById('sendBtn');
  const newConversationBtnEl = document.getElementById('newConversationBtn');
  const chatTitleEl = document.getElementById('chatTitle');
  const sidebarEl = document.getElementById('sidebar');
  const overlayEl = document.getElementById('overlay');
  const menuBtnEl = document.getElementById('menuBtn');
  const userAreaEl = document.getElementById('userArea');
  const loginModalEl = document.getElementById('loginModal');

  let conversations = [];
  let activeConversationId = null;
  let clerkInstance = null;
  let sessionToken = null;

  // ══════════════════════════════════════════════════════════════
  // Clerk 初始化
  // ══════════════════════════════════════════════════════════════
  async function initClerk() {
    await window.Clerk.load();
    clerkInstance = window.Clerk;

    // 监听认证状态变化
    clerkInstance.addListener(async ({ user }) => {
      if (user) {
        sessionToken = await clerkInstance.session.getToken();
        hideLoginModal();
        renderUserArea(user);
        enableChat();
        await loadConversations();
      } else {
        sessionToken = null;
        showLoginModal();
        renderUserArea(null);
        disableChat();
        conversations = [];
        activeConversationId = null;
        conversationListEl.innerHTML = '';
        messagesEl.innerHTML = '<div style="text-align:center;padding-top:40px;color:#9ca3af;font-size:15px;">请先登录以开始使用</div>';
        chatTitleEl.textContent = 'AI 聊天';
      }
    });

    // 如果未登录则显示登录弹窗
    if (!clerkInstance.user) {
      showLoginModal();
      mountSignInComponent();
    } else {
      sessionToken = await clerkInstance.session.getToken();
      renderUserArea(clerkInstance.user);
      enableChat();
    }
  }

  // 等待 Clerk 脚本加载完成
  window.addEventListener('load', () => {
    if (window.Clerk) {
      initClerk();
    } else {
      // 如果脚本还没加载完，设置一个轮询等待
      const interval = setInterval(() => {
        if (window.Clerk) {
          clearInterval(interval);
          initClerk();
        }
      }, 100);
    }
  });

  function mountSignInComponent() {
    if (!clerkInstance) return;
    const el = document.getElementById('clerk-signin-target');
    if (el) {
      clerkInstance.mountSignIn(el, {
        afterSignInUrl: window.location.href,
        routing: 'hash'
      });
    }
  }

  function showLoginModal() {
    loginModalEl.style.display = 'flex';
  }

  function hideLoginModal() {
    loginModalEl.style.display = 'none';
  }

  function renderUserArea(user) {
    userAreaEl.innerHTML = '';
    if (!user) {
      const loginBtn = document.createElement('button');
      loginBtn.className = 'btn btn-primary';
      loginBtn.textContent = '登录';
      loginBtn.addEventListener('click', () => {
        showLoginModal();
        mountSignInComponent();
      });
      userAreaEl.appendChild(loginBtn);
      return;
    }

    const avatar = document.createElement('img');
    avatar.className = 'user-avatar';
    avatar.src = user.imageUrl || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.firstName || user.username || 'User') + '&background=random';
    avatar.alt = user.username || 'avatar';

    const name = document.createElement('span');
    name.className = 'user-name';
    name.textContent = user.firstName || user.username || user.emailAddresses[0]?.emailAddress || '用户';

    const logoutBtn = document.createElement('button');
    logoutBtn.className = 'logout-btn';
    logoutBtn.textContent = '退出';
    logoutBtn.addEventListener('click', async () => {
      await clerkInstance.signOut();
    });

    userAreaEl.appendChild(avatar);
    userAreaEl.appendChild(name);
    userAreaEl.appendChild(logoutBtn);
  }

  function enableChat() {
    messageInputEl.disabled = false;
    sendBtnEl.disabled = false;
    messageInputEl.placeholder = '输入消息，回车发送，Shift+回车换行';
  }

  function disableChat() {
    messageInputEl.disabled = true;
    sendBtnEl.disabled = true;
    messageInputEl.placeholder = '请先登录';
  }

  // ══════════════════════════════════════════════════════════════
  // API 请求辅助函数（自动携带 Clerk Token）
  // ══════════════════════════════════════════════════════════════
  async function apiFetch(url, options = {}) {
    const opts = {
      ...options,
      headers: {
        ...(options.headers || {}),
        'Content-Type': 'application/json'
      }
    };
    if (sessionToken) {
      opts.headers['Authorization'] = `Bearer ${sessionToken}`;
    }
    return fetch(url, opts);
  }

  // ══════════════════════════════════════════════════════════════
  // 原有 UI 逻辑
  // ══════════════════════════════════════════════════════════════
  function toggleSidebar(show) {
    if (show) {
      sidebarEl.classList.add('open');
      overlayEl.classList.add('show');
    } else {
      sidebarEl.classList.remove('open');
      overlayEl.classList.remove('show');
    }
  }

  menuBtnEl.addEventListener('click', () => toggleSidebar(true));
  overlayEl.addEventListener('click', () => toggleSidebar(false));

  function setLoading(loading) {
    sendBtnEl.disabled = loading;
    if (loading) {
      sendBtnEl.classList.add('loading');
    } else {
      sendBtnEl.classList.remove('loading');
    }
  }

  function autoResizeTextArea() {
    messageInputEl.style.height = 'auto';
    messageInputEl.style.height = Math.min(messageInputEl.scrollHeight, 180) + 'px';
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function renderConversations() {
    conversationListEl.innerHTML = '';

    conversations.forEach((conversation) => {
      const item = document.createElement('div');
      item.className = 'conversation-item' + (conversation.id === activeConversationId ? ' active' : '');

      const title = document.createElement('div');
      title.className = 'conversation-title';
      title.textContent = conversation.title || '新对话';

      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.textContent = '删除';
      delBtn.addEventListener('click', async (event) => {
        event.stopPropagation();

        const ok = confirm('确认删除这个对话吗？删除后无法恢复。');
        if (!ok) return;

        await apiFetch(`/api/conversations/${conversation.id}`, { method: 'DELETE' });

        if (activeConversationId === conversation.id) {
          activeConversationId = null;
          messagesEl.innerHTML = '';
        }

        await loadConversations(true);
      });

      item.appendChild(title);
      item.appendChild(delBtn);

      item.addEventListener('click', async () => {
        activeConversationId = conversation.id;
        chatTitleEl.textContent = conversation.title || '新对话';
        renderConversations();
        await loadMessages(conversation.id);
        if (window.innerWidth <= 860) toggleSidebar(false);
      });

      conversationListEl.appendChild(item);
    });
  }

  function renderMessage(role, content) {
    const div = document.createElement('div');
    div.className = `message ${role}`;

    if (role === 'assistant') {
      div.innerHTML = marked.parse(content || '');
    } else {
      div.textContent = content;
    }

    messagesEl.appendChild(div);
  }

  async function loadMessages(conversationId) {
    const res = await apiFetch(`/api/conversations/${conversationId}/messages`);
    if (!res.ok) {
      const data = await res.json();
      messagesEl.innerHTML = `<div style="text-align:center;color:#dc2626;padding:20px;">${data.message || '加载失败'}</div>`;
      return;
    }
    const data = await res.json();

    messagesEl.innerHTML = '';
    data.forEach((msg) => renderMessage(msg.role, msg.content));
    scrollToBottom();
  }

  async function createConversation() {
    const res = await apiFetch('/api/conversations', {
      method: 'POST',
      body: JSON.stringify({})
    });
    return await res.json();
  }

  async function loadConversations(keepCurrent = false) {
    const res = await apiFetch('/api/conversations');
    if (!res.ok) {
      const data = await res.json();
      if (res.status === 401) {
        showLoginModal();
        mountSignInComponent();
      }
      return;
    }
    conversations = await res.json();

    if (conversations.length === 0) {
      const newConv = await createConversation();
      conversations = [newConv];
    }

    if (!keepCurrent || !activeConversationId) {
      activeConversationId = conversations[0].id;
    }

    const current = conversations.find((c) => c.id === activeConversationId) || conversations[0];
    activeConversationId = current.id;
    chatTitleEl.textContent = current.title || '新对话';

    renderConversations();
    await loadMessages(activeConversationId);
  }

  async function sendMessage() {
    const message = messageInputEl.value.trim();
    if (!message || !activeConversationId) return;

    renderMessage('user', message);
    scrollToBottom();

    messageInputEl.value = '';
    autoResizeTextArea();
    setLoading(true);

    try {
      const res = await apiFetch('/api/chat', {
        method: 'POST',
        body: JSON.stringify({
          conversation_id: activeConversationId,
          message: message
        })
      });

      const data = await res.json();
      if (!res.ok) {
        throw new Error(data.message || '发送失败');
      }

      renderMessage('assistant', data.reply || '');
      scrollToBottom();
      await loadConversations(true);
    } catch (error) {
      renderMessage('assistant', `请求失败：${error.message}`);
      scrollToBottom();
    } finally {
      setLoading(false);
    }
  }

  sendBtnEl.addEventListener('click', sendMessage);

  messageInputEl.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' && !event.shiftKey) {
      event.preventDefault();
      sendMessage();
    }
  });

  messageInputEl.addEventListener('input', autoResizeTextArea);

  newConversationBtnEl.addEventListener('click', async () => {
    await createConversation();
    await loadConversations();
    if (window.innerWidth <= 860) toggleSidebar(false);
  });

  // 如果登录后自动加载对话
  if (window.Clerk && window.Clerk.user) {
    loadConversations();
  }
</script>
</body>
</html>
