<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 聊天服务</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="{{ clerk_publishable_key }}"
    src="{{ clerk_frontend_api }}/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
    type="text/javascript">
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      height: 100vh;
      overflow: hidden;
    }

    /* ── 布局 ── */
    .app { display: flex; height: 100vh; }

    .sidebar {
      width: 280px;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform .25s;
      z-index: 20;
    }

    .sidebar-header {
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .sidebar-header h2 { font-size: 16px; font-weight: 600; }

    .btn-new {
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-new:hover { background: #2563eb; }

    .conv-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .conv-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 14px;
      transition: background .15s;
      margin-bottom: 2px;
      word-break: break-all;
    }
    .conv-item:hover { background: rgba(255,255,255,.08); }
    .conv-item.active { background: rgba(59,130,246,.3); }

    .conv-item .del-btn {
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      font-size: 16px;
      padding: 0 4px;
      opacity: 0;
      transition: opacity .15s;
      flex-shrink: 0;
    }
    .conv-item:hover .del-btn { opacity: 1; }
    .conv-item .del-btn:hover { color: #f87171; }

    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid rgba(255,255,255,.08);
      font-size: 13px;
      color: #94a3b8;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-info img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
    }

    .user-info .user-name { font-weight: 500; color: #e2e8f0; }

    .btn-logout {
      background: none;
      border: 1px solid #475569;
      color: #94a3b8;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      margin-left: auto;
      transition: all .2s;
    }
    .btn-logout:hover { border-color: #f87171; color: #f87171; }

    /* ── 主区域 ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .main-header {
      padding: 14px 20px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .menu-btn {
      display: none;
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
    }

    /* ── 消息区 ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.7;
      word-break: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: #3b82f6;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.assistant {
      align-self: flex-start;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-bottom-left-radius: 4px;
    }

    .msg.assistant pre {
      background: #1e293b;
      color: #e2e8f0;
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 8px 0;
      font-size: 13px;
    }

    .msg.assistant code {
      font-family: "Fira Code", "Consolas", monospace;
      font-size: 13px;
    }

    .msg.assistant p { margin: 6px 0; }
    .msg.assistant ul, .msg.assistant ol { padding-left: 20px; }

    .empty-hint {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #9ca3af;
      font-size: 15px;
    }

    .typing-indicator {
      align-self: flex-start;
      padding: 12px 16px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      border-bottom-left-radius: 4px;
      color: #6b7280;
      font-size: 14px;
    }

    .typing-indicator .dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0%  { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }

    /* ── 输入区 ── */
    .input-area {
      padding: 12px 20px;
      background: #fff;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-area textarea {
      flex: 1;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      min-height: 42px;
      line-height: 1.5;
      outline: none;
      transition: border-color .2s;
    }
    .input-area textarea:focus { border-color: #3b82f6; }

    .btn-send {
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: background .2s;
    }
    .btn-send:hover { background: #2563eb; }
    .btn-send:disabled { background: #93c5fd; cursor: not-allowed; }

    /* ── 登录遮罩 ── */
    .login-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hidden { display: none !important; }

    /* ── 移动端 ── */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        inset: 0;
        width: 280px;
        transform: translateX(-100%);
      }
      .sidebar.open { transform: translateX(0); }
      .menu-btn { display: block; }

      .mobile-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,.3);
        z-index: 15;
      }

      .msg { max-width: 90%; }
    }
  </style>
</head>
<body>

<div class="app">
  <!-- 侧边栏 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>对话列表</h2>
      <button class="btn-new" id="btnNew">+ 新建</button>
    </div>
    <div class="conv-list" id="convList"></div>
    <div class="sidebar-footer" id="sidebarFooter"></div>
  </aside>

  <!-- 移动端遮罩 -->
  <div class="mobile-overlay hidden" id="mobileOverlay"></div>

  <!-- 主区域 -->
  <div class="main">
    <div class="main-header">
      <button class="menu-btn" id="menuBtn">☰</button>
      <span id="mainTitle">AI 聊天</span>
    </div>
    <div class="messages" id="messages">
      <div class="empty-hint" id="emptyHint">选择或新建一个对话开始聊天</div>
    </div>
    <div class="input-area">
      <textarea id="inputBox" rows="1" placeholder="输入消息，回车发送，Shift+回车换行" disabled></textarea>
      <button class="btn-send" id="btnSend" disabled>发送</button>
    </div>
  </div>
</div>

<!-- 登录遮罩 -->
<div class="login-overlay hidden" id="loginOverlay">
  <div id="clerkSignIn"></div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
// 状态
// ════════════════════════════════════════════════════════════════
let clerkInstance = null;
let authToken = null;
let currentUser = null;
let conversations = [];
let activeConvId = null;
let isSending = false;

const $ = id => document.getElementById(id);

const DOM = {
  sidebar: $('sidebar'),
  convList: $('convList'),
  sidebarFooter: $('sidebarFooter'),
  messages: $('messages'),
  emptyHint: $('emptyHint'),
  inputBox: $('inputBox'),
  btnSend: $('btnSend'),
  btnNew: $('btnNew'),
  menuBtn: $('menuBtn'),
  mainTitle: $('mainTitle'),
  loginOverlay: $('loginOverlay'),
  clerkSignIn: $('clerkSignIn'),
  mobileOverlay: $('mobileOverlay'),
};

// ════════════════════════════════════════════════════════════════
// Clerk 初始化
// ════════════════════════════════════════════════════════════════
window.addEventListener('load', async () => {
  try {
    await window.Clerk.load();
    clerkInstance = window.Clerk;

    if (clerkInstance.user) {
      await onSignedIn();
    } else {
      showLogin();
    }

    // 监听登录/登出
    clerkInstance.addListener(({ user }) => {
      if (user) {
        onSignedIn();
      } else {
        onSignedOut();
      }
    });
  } catch (e) {
    console.error('Clerk 初始化失败:', e);
    DOM.emptyHint.textContent = 'Clerk 加载失败，请刷新页面重试';
  }
});

function showLogin() {
  DOM.loginOverlay.classList.remove('hidden');
  clerkInstance.mountSignIn(DOM.clerkSignIn);
}

function hideLogin() {
  DOM.loginOverlay.classList.add('hidden');
  clerkInstance.unmountSignIn(DOM.clerkSignIn);
}

async function onSignedIn() {
  // 获取 session token
  const session = clerkInstance.session;
  if (session) {
    authToken = await session.getToken();
  }
  currentUser = clerkInstance.user;

  hideLogin();
  renderUserInfo();
  enableInput();
  await loadConversations();
}

function onSignedOut() {
  authToken = null;
  currentUser = null;
  conversations = [];
  activeConvId = null;
  DOM.convList.innerHTML = '';
  DOM.messages.innerHTML = '<div class="empty-hint">请登录后使用</div>';
  DOM.mainTitle.textContent = 'AI 聊天';
  disableInput();
  DOM.sidebarFooter.innerHTML = '';
  showLogin();
}

// ════════════════════════════════════════════════════════════════
// API 请求封装
// ════════════════════════════════════════════════════════════════
async function refreshToken() {
  if (clerkInstance && clerkInstance.session) {
    authToken = await clerkInstance.session.getToken();
  }
}

async function api(path, opts = {}) {
  await refreshToken();
  const res = await fetch(path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${authToken}`,
      ...(opts.headers || {}),
    },
  });
  if (res.status === 401) {
    onSignedOut();
    throw new Error('认证过期');
  }
  return res;
}

// ════════════════════════════════════════════════════════════════
// 对话列表
// ════════════════════════════════════════════════════════════════
async function loadConversations() {
  try {
    const res = await api('/api/conversations');
    if (!res.ok) throw new Error('服务暂时不可用');
    const data = await res.json();
    conversations = Array.isArray(data) ? data : [];
    renderConvList();
  } catch (e) {
    console.error('加载对话列表失败:', e);
  }
}

function renderConvList() {
  DOM.convList.innerHTML = '';
  if (conversations.length === 0) {
    DOM.convList.innerHTML = '<div style="padding:20px;text-align:center;color:#64748b;font-size:13px;">暂无对话，点击上方新建</div>';
    return;
  }
  conversations.forEach(c => {
    const div = document.createElement('div');
    div.className = 'conv-item' + (c.id === activeConvId ? ' active' : '');
    div.innerHTML = `
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(c.title)}</span>
      <button class="del-btn" title="删除">×</button>
    `;
    div.querySelector('span').onclick = () => selectConversation(c.id);
    div.querySelector('.del-btn').onclick = (e) => { e.stopPropagation(); deleteConversation(c.id); };
    DOM.convList.appendChild(div);
  });
}

async function selectConversation(id) {
  activeConvId = id;
  renderConvList();
  enableInput();
  const conv = conversations.find(c => c.id === id);
  DOM.mainTitle.textContent = conv ? conv.title : 'AI 聊天';
  await loadMessages(id);
  closeMobileSidebar();
}

async function loadMessages(convId) {
  DOM.messages.innerHTML = '';
  try {
    const res = await api(`/api/conversations/${convId}/messages`);
    const msgs = await res.json();
    if (msgs.length === 0) {
      DOM.messages.innerHTML = '<div class="empty-hint">发送一条消息开始对话吧</div>';
      return;
    }
    msgs.forEach(m => appendMessage(m.role, m.content));
    scrollToBottom();
  } catch (e) {
    console.error('加载消息失败:', e);
  }
}

async function createConversation() {
  try {
    const res = await api('/api/conversations', { method: 'POST' });
    const conv = await res.json();
    conversations.unshift(conv);
    await selectConversation(conv.id);
  } catch (e) {
    console.error('创建对话失败:', e);
  }
}

async function deleteConversation(id) {
  try {
    await api(`/api/conversations/${id}`, { method: 'DELETE' });
    conversations = conversations.filter(c => c.id !== id);
    if (activeConvId === id) {
      activeConvId = null;
      DOM.messages.innerHTML = '<div class="empty-hint">选择或新建一个对话开始聊天</div>';
      DOM.mainTitle.textContent = 'AI 聊天';
      disableInput();
    }
    renderConvList();
  } catch (e) {
    console.error('删除对话失败:', e);
  }
}

// ════════════════════════════════════════════════════════════════
// 发送消息
// ════════════════════════════════════════════════════════════════
async function sendMessage() {
  const text = DOM.inputBox.value.trim();
  if (!text || !activeConvId || isSending) return;

  isSending = true;
  DOM.btnSend.disabled = true;
  DOM.inputBox.value = '';
  autoResize();

  // 清除空提示
  const hint = DOM.messages.querySelector('.empty-hint');
  if (hint) hint.remove();

  appendMessage('user', text);
  scrollToBottom();

  // 显示"正在输入"
  const typing = document.createElement('div');
  typing.className = 'typing-indicator';
  typing.innerHTML = 'AI 正在思考<span class="dots"></span>';
  DOM.messages.appendChild(typing);
  scrollToBottom();

  try {
    const res = await api('/api/chat', {
      method: 'POST',
      body: JSON.stringify({ conversation_id: activeConvId, message: text }),
    });
    const data = await res.json();
    typing.remove();

    if (res.ok) {
      appendMessage('assistant', data.reply);
      // 刷新对话列表标题
      await loadConversations();
      renderConvList();
    } else {
      appendMessage('assistant', `⚠️ 错误: ${data.message || '请求失败'}`);
    }
  } catch (e) {
    typing.remove();
    appendMessage('assistant', `⚠️ 网络错误: ${e.message}`);
  }

  isSending = false;
  DOM.btnSend.disabled = false;
  DOM.inputBox.focus();
  scrollToBottom();
}

// ════════════════════════════════════════════════════════════════
// DOM 操作
// ════════════════════════════════════════════════════════════════
function appendMessage(role, content) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (role === 'assistant') {
    div.innerHTML = marked.parse(content);
  } else {
    div.textContent = content;
  }
  DOM.messages.appendChild(div);
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    DOM.messages.scrollTop = DOM.messages.scrollHeight;
  });
}

function renderUserInfo() {
  if (!currentUser) return;
  const name = currentUser.firstName || currentUser.username ||
    (currentUser.emailAddresses && currentUser.emailAddresses[0] && currentUser.emailAddresses[0].emailAddress) || '用户';
  const avatar = currentUser.imageUrl;
  DOM.sidebarFooter.innerHTML = `
    <div class="user-info">
      ${avatar ? `<img src="${avatar}" alt="avatar">` : ''}
      <span class="user-name">${escHtml(name)}</span>
      <button class="btn-logout" id="btnLogout">退出</button>
    </div>
  `;
  document.getElementById('btnLogout').onclick = () => clerkInstance.signOut();
}

function enableInput() {
  if (activeConvId) {
    DOM.inputBox.disabled = false;
    DOM.btnSend.disabled = false;
  }
}

function disableInput() {
  DOM.inputBox.disabled = true;
  DOM.btnSend.disabled = true;
}

function autoResize() {
  DOM.inputBox.style.height = 'auto';
  DOM.inputBox.style.height = Math.min(DOM.inputBox.scrollHeight, 120) + 'px';
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ════════════════════════════════════════════════════════════════
// 移动端侧边栏
// ════════════════════════════════════════════════════════════════
function openMobileSidebar() {
  DOM.sidebar.classList.add('open');
  DOM.mobileOverlay.classList.remove('hidden');
}

function closeMobileSidebar() {
  DOM.sidebar.classList.remove('open');
  DOM.mobileOverlay.classList.add('hidden');
}

// ════════════════════════════════════════════════════════════════
// 事件绑定
// ════════════════════════════════════════════════════════════════
DOM.btnNew.onclick = createConversation;
DOM.btnSend.onclick = sendMessage;
DOM.menuBtn.onclick = openMobileSidebar;
DOM.mobileOverlay.onclick = closeMobileSidebar;

DOM.inputBox.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

DOM.inputBox.addEventListener('input', autoResize);
</script>
</body>
</html>
