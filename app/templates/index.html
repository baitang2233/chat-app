<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 聊天助手</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script
    async crossorigin="anonymous"
    data-clerk-publishable-key="{{ clerk_publishable_key }}"
    src="{{ clerk_frontend_api }}/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
    type="text/javascript">
  </script>
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sidebar-w: 260px;
  --bg-main: #1a1a1a;
  --bg-sidebar: #171717;
  --bg-chat: #212121;
  --bg-user-msg: #303030;
  --bg-input: #303030;
  --text-primary: #e0e0e0;
  --text-secondary: #8a8a8a;
  --text-sidebar: #b0b0b0;
  --text-sidebar-active: #ffffff;
  --border: #3a3a3a;
  --accent: #4f8ff7;
  --accent-hover: #3b7de7;
  --thinking-bg: rgba(255,255,255,.04);
  --thinking-border: #555;
}

body {
  font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg-main);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
}

/* ═══════ 布局 ═══════ */
.app { display: flex; height: 100vh; }

/* ═══════ 侧边栏 ═══════ */
.sidebar {
  width: var(--sidebar-w);
  background: var(--bg-sidebar);
  color: var(--text-sidebar);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: margin-left .3s cubic-bezier(.4,0,.2,1), opacity .3s;
  z-index: 20;
  overflow: hidden;
}

.sidebar.collapsed {
  margin-left: calc(-1 * var(--sidebar-w));
  opacity: 0;
  pointer-events: none;
}

.sidebar-top {
  padding: 16px 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.btn-new-chat {
  display: flex; align-items: center; gap: 8px;
  width: 100%;
  padding: 10px 14px;
  background: rgba(255,255,255,.06);
  color: var(--text-sidebar);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 10px;
  font-size: 14px;
  cursor: pointer;
  transition: background .2s;
}
.btn-new-chat:hover { background: rgba(255,255,255,.1); }
.btn-new-chat svg { width: 18px; height: 18px; }

/* 搜索框 */
.search-box {
  position: relative;
  display: none;
}
.search-box.show { display: block; }
.search-box input {
  width: 100%;
  padding: 8px 12px 8px 34px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 8px;
  color: #e0e0e0;
  font-size: 13px;
  outline: none;
}
.search-box input::placeholder { color: rgba(255,255,255,.3); }
.search-box input:focus { border-color: var(--accent); }
.search-box .search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: rgba(255,255,255,.3); font-size: 13px; pointer-events: none;
}

/* 对话列表 */
.conv-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 8px;
}
.conv-list::-webkit-scrollbar { width: 4px; }
.conv-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

.conv-item {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 13px;
  transition: background .15s;
  margin-bottom: 1px;
  color: var(--text-sidebar);
}
.conv-item:hover { background: rgba(255,255,255,.06); }
.conv-item.active { background: rgba(255,255,255,.1); color: var(--text-sidebar-active); }

.conv-title {
  flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.conv-del {
  background: none; border: none; color: rgba(255,255,255,.25);
  cursor: pointer; font-size: 15px; padding: 0 2px;
  opacity: 0; transition: opacity .15s, color .15s; flex-shrink: 0;
}
.conv-item:hover .conv-del { opacity: 1; }
.conv-del:hover { color: #f87171; }

/* 侧边栏底部用户 */
.sidebar-footer {
  padding: 10px 14px;
  border-top: 1px solid rgba(255,255,255,.06);
}

.user-info {
  display: flex; align-items: center; gap: 10px;
  cursor: pointer; padding: 6px 4px; border-radius: 8px;
  transition: background .15s; user-select: none;
}
.user-info:hover { background: rgba(255,255,255,.06); }
.user-info img { width: 30px; height: 30px; border-radius: 50%; }
.user-name { font-size: 13px; font-weight: 500; color: var(--text-sidebar); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.user-dots { font-size: 16px; color: rgba(255,255,255,.3); }

/* 用户面板 */
.user-panel {
  position: absolute; bottom: calc(100% + 6px); left: 0; right: 0;
  background: #2a2a2a; border-radius: 10px;
  box-shadow: 0 8px 30px rgba(0,0,0,.6);
  z-index: 50; overflow: hidden;
  opacity: 0; transform: translateY(6px);
  pointer-events: none; transition: opacity .2s, transform .2s;
}
.user-panel.show { opacity: 1; transform: translateY(0); pointer-events: auto; }

.user-panel-header {
  padding: 14px; display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid rgba(255,255,255,.06);
}
.user-panel-header img { width: 38px; height: 38px; border-radius: 50%; }
.panel-user-name { font-weight: 600; font-size: 13px; color: #e8e8e8; }
.panel-user-email { font-size: 11px; color: #777; margin-top: 1px; }

.user-panel-actions { padding: 4px; }
.user-panel-actions button {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 9px 12px;
  background: none; border: none; color: #c0c0c0;
  font-size: 13px; cursor: pointer; border-radius: 6px;
  transition: background .15s;
}
.user-panel-actions button:hover { background: rgba(255,255,255,.06); }

/* ═══════ 主区域 ═══════ */
.main {
  flex: 1; display: flex; flex-direction: column; min-width: 0;
  position: relative;
  background: var(--bg-chat);
}

/* 顶栏 */
.main-header {
  height: 50px;
  padding: 0 16px;
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-chat);
  border-bottom: 1px solid var(--border);
  position: relative;
}

.header-left { display: flex; align-items: center; gap: 6px; }

.btn-toggle-sidebar {
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  background: none; border: none; border-radius: 8px;
  cursor: pointer; color: var(--text-secondary); font-size: 18px;
  transition: background .15s;
}
.btn-toggle-sidebar:hover { background: rgba(255,255,255,.08); }

.btn-search-top {
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  background: none; border: none; border-radius: 8px;
  cursor: pointer; color: var(--text-secondary); font-size: 16px;
  transition: background .15s;
}
.btn-search-top:hover { background: rgba(255,255,255,.08); }

.main-title {
  position: absolute; left: 50%; transform: translateX(-50%);
  font-size: 15px; font-weight: 600; color: var(--text-primary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 50%;
}

/* 消息区 */
.messages-wrapper {
  flex: 1; overflow-y: auto; display: flex; justify-content: center;
}
.messages-wrapper::-webkit-scrollbar { width: 6px; }
.messages-wrapper::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 3px; }

.messages {
  width: 100%; max-width: 780px;
  padding: 24px 20px 20px;
  display: flex; flex-direction: column; gap: 24px;
}

.empty-hint {
  flex: 1; display: flex; align-items: center; justify-content: center;
  color: var(--text-secondary); font-size: 15px;
}

/* 消息气泡 */
.msg-group { display: flex; flex-direction: column; gap: 4px; }

.msg-user {
  align-self: flex-end;
  max-width: 80%;
  background: var(--bg-user-msg);
  color: var(--text-primary);
  padding: 12px 16px;
  border-radius: 18px 18px 4px 18px;
  font-size: 14px; line-height: 1.7;
  word-break: break-word;
  white-space: pre-wrap;
}

.msg-assistant {
  align-self: flex-start;
  max-width: 90%;
  font-size: 14px; line-height: 1.8;
  word-break: break-word;
  color: var(--text-primary);
}

.msg-assistant p { margin: 6px 0; }
.msg-assistant ul, .msg-assistant ol { padding-left: 20px; }
.msg-assistant pre {
  background: #1a1a1a; color: #d4d4d4;
  padding: 14px; border-radius: 10px;
  overflow-x: auto; margin: 10px 0; font-size: 13px;
  border: 1px solid var(--border);
}
.msg-assistant code {
  font-family: "Fira Code", "Consolas", monospace; font-size: 13px;
}
.msg-assistant :not(pre) > code {
  background: rgba(255,255,255,.08);
  padding: 2px 6px;
  border-radius: 4px;
}
.msg-assistant > :first-child { margin-top: 0; }
.msg-assistant a { color: var(--accent); }
.msg-assistant blockquote {
  border-left: 3px solid var(--border);
  padding-left: 12px;
  color: var(--text-secondary);
  margin: 8px 0;
}

/* 思考过程 */
.thinking-block {
  background: var(--thinking-bg);
  border-left: 3px solid var(--thinking-border);
  border-radius: 0 8px 8px 0;
  margin-bottom: 10px;
  font-size: 13px; line-height: 1.7;
  color: #999;
  position: relative;
  overflow: hidden;
}
.thinking-block.collapsed .thinking-content { display: none; }
.thinking-label {
  font-weight: 600; font-size: 12px; color: #888;
  padding: 10px 16px;
  display: flex; align-items: center; gap: 6px;
  cursor: pointer; user-select: none;
}
.thinking-label:hover { color: #aaa; }
.thinking-label .arrow {
  transition: transform .2s;
  display: inline-block;
  font-size: 10px;
}
.thinking-block:not(.collapsed) .thinking-label .arrow { transform: rotate(90deg); }
.thinking-content {
  padding: 0 16px 12px;
  white-space: pre-wrap; word-break: break-word;
}

/* 流式打字光标 */
.streaming-cursor::after {
  content: '|'; animation: blink .6s infinite; color: var(--accent);
  font-weight: 300;
}
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

/* ═══════ 输入区 ═══════ */
.input-container {
  padding: 0 20px 20px;
  display: flex; justify-content: center;
}

.input-box-wrapper {
  width: 100%; max-width: 780px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 16px;
  transition: border-color .2s, box-shadow .2s;
}
.input-box-wrapper:focus-within {
  border-color: #555;
  box-shadow: 0 0 0 1px rgba(255,255,255,.05);
}

.input-top {
  padding: 12px 16px 0;
}

.input-top textarea {
  width: 100%;
  border: none; outline: none; resize: none;
  font-size: 14px; font-family: inherit;
  line-height: 1.6; color: var(--text-primary);
  background: transparent;
  max-height: 150px; min-height: 24px;
}
.input-top textarea::placeholder { color: #666; }

.input-bottom {
  padding: 8px 12px;
  display: flex; align-items: center; justify-content: space-between;
}

.input-tools { display: flex; align-items: center; gap: 4px; }

/* 深度思考开关 */
.think-toggle {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  font-size: 13px; color: var(--text-secondary);
  cursor: pointer; transition: all .2s;
  user-select: none;
}
.think-toggle:hover { border-color: #666; color: #bbb; }
.think-toggle.active {
  background: rgba(79,143,247,.15); border-color: var(--accent); color: var(--accent);
}

.btn-send-circle {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: none;
  background: var(--accent);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background .2s, opacity .2s;
  font-size: 16px;
}
.btn-send-circle:hover { background: var(--accent-hover); }
.btn-send-circle:disabled { opacity: .3; cursor: not-allowed; }

/* ═══════ 登录遮罩 ═══════ */
.login-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
}

.hidden { display: none !important; }

/* ═══════ 搜索模态框 ═══════ */
.search-modal {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 60;
  display: flex; align-items: flex-start; justify-content: center;
  padding-top: 100px;
}
.search-modal-box {
  width: 90%; max-width: 520px;
  background: #2a2a2a;
  border-radius: 14px;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
  overflow: hidden;
  border: 1px solid var(--border);
}
.search-modal-input {
  width: 100%; padding: 16px 20px;
  border: none; outline: none;
  font-size: 15px; color: var(--text-primary);
  background: transparent;
  border-bottom: 1px solid var(--border);
}
.search-modal-input::placeholder { color: #666; }
.search-results {
  max-height: 320px; overflow-y: auto; padding: 6px;
}
.search-result-item {
  padding: 10px 14px; border-radius: 8px;
  cursor: pointer; font-size: 14px; color: var(--text-primary);
  transition: background .15s;
}
.search-result-item:hover { background: rgba(255,255,255,.06); }
.search-empty {
  padding: 24px; text-align: center; color: var(--text-secondary); font-size: 13px;
}

/* ═══════ KaTeX ═══════ */
.katex-display { overflow-x: auto; overflow-y: hidden; padding: 4px 0; }
.msg-assistant .katex { color: var(--text-primary); }

/* ═══════ 移动端 ═══════ */
@media (max-width: 768px) {
  .sidebar {
    position: fixed; inset: 0; width: 280px;
    margin-left: 0 !important;
    transform: translateX(-100%);
    opacity: 1 !important;
    pointer-events: auto !important;
    transition: transform .3s cubic-bezier(.4,0,.2,1);
  }
  .sidebar.mobile-open { transform: translateX(0); }
  .sidebar.collapsed { transform: translateX(-100%); }
  .mobile-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 15;
  }
  .msg-user { max-width: 90%; }
  .messages { padding: 16px 12px; }
}
  </style>
</head>

<div class="app" id="app">
  <!-- 侧边栏 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <button class="btn-new-chat" id="btnNew">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

      <div class="header-left">
        <button class="btn-toggle-sidebar" id="btnToggleSidebar" title="收起侧边栏">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
        </button>
        <button class="btn-search-top" id="btnSearchTop" title="搜索对话">

      </div>

        </div>

          <div class="input-tools">

              <span>深度思考</span>
            </button>
          </div>
          <button class="btn-send-circle" id="btnSend" disabled title="发送">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3.478 2.405a.75.75 0 0 0-.926.94l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.519 60.519 0 0 0 18.445-8.986.75.75 0 0 0 0-1.218A60.517 60.517 0 0 0 3.478 2.405Z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 登录遮罩 -->
<div class="login-overlay hidden" id="loginOverlay">
  <div id="clerkSignIn"></div>
</div>

<!-- 搜索模态框 -->
<div class="search-modal hidden" id="searchModal">
  <div class="search-modal-box">
    <input class="search-modal-input" id="searchModalInput" placeholder="搜索对话内容或标题..." />
    <div class="search-results" id="searchResults">
      <div class="search-empty">输入关键词搜索对话</div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
// 状态
// ════════════════════════════════════════════════════════════════
let clerkInstance = null;
let authToken = null;
let currentUser = null;
let conversations = [];
let activeConvId = null;
let isSending = false;
let isSignedIn = false;
let authProcessing = false;
let loginMounted = false;
let thinkingEnabled = false;
let sidebarCollapsed = false;

const $ = id => document.getElementById(id);
const DOM = {
  sidebar: $('sidebar'),
  convList: $('convList'),
  sidebarFooter: $('sidebarFooter'),
  messagesWrapper: $('messagesWrapper'),
  messages: $('messages'),
  emptyHint: $('emptyHint'),
  inputBox: $('inputBox'),
  btnSend: $('btnSend'),
  btnNew: $('btnNew'),
  mainTitle: $('mainTitle'),
  loginOverlay: $('loginOverlay'),
  clerkSignIn: $('clerkSignIn'),
  mobileOverlay: $('mobileOverlay'),
  btnToggleSidebar: $('btnToggleSidebar'),
  btnSearchTop: $('btnSearchTop'),
  btnThink: $('btnThink'),
  searchModal: $('searchModal'),
  searchModalInput: $('searchModalInput'),
  searchResults: $('searchResults'),
};

// ════════════════════════════════════════════════════════════════
// marked.js 配置
// ════════════════════════════════════════════════════════════════
marked.setOptions({ breaks: true, gfm: true });

// ════════════════════════════════════════════════════════════════
// LaTeX 保护 + 渲染
// marked.js 会吞掉反斜杠，必须先提取 LaTeX 块用占位符保护
// ════════════════════════════════════════════════════════════════
function renderMarkdownWithLatex(text) {
  if (!text) return '';
  const placeholders = [];
  let idx = 0;

  // 保护代码块 (```...```) 不被 LaTeX 提取干扰
  const codeBlocks = [];
  text = text.replace(/(```[\s\S]*?```|`[^`\n]+`)/g, (m) => {
    const key = '%%CODE' + codeBlocks.length + '%%';
    codeBlocks.push(m);
    return key;
  });

  // 提取 display math: $$...$$ 和 \[...\]
  text = text.replace(/\$\$([\s\S]+?)\$\$/g, (m, p1) => {
    const key = '%%MATH' + idx + '%%';
    placeholders[idx] = { tex: p1.trim(), display: true };
    idx++;
    return key;
  });
  text = text.replace(/\\\[([\s\S]+?)\\\]/g, (m, p1) => {
    const key = '%%MATH' + idx + '%%';
    placeholders[idx] = { tex: p1.trim(), display: true };
    idx++;
    return key;
  });

  // 提取 inline math: $...$ 和 \(...\)
  text = text.replace(/\\\(([\s\S]+?)\\\)/g, (m, p1) => {
    const key = '%%MATH' + idx + '%%';
    placeholders[idx] = { tex: p1.trim(), display: false };
    idx++;
    return key;
  });
  // 单 $ — 避免误匹配货币符号，要求 $ 后紧跟非空格
  text = text.replace(/\$([^$\n]+?)\$/g, (m, p1) => {
    const key = '%%MATH' + idx + '%%';
    placeholders[idx] = { tex: p1.trim(), display: false };
    idx++;
    return key;
  });

  // 还原代码块
  text = text.replace(/%%CODE(\d+)%%/g, (m, i) => codeBlocks[parseInt(i)]);

  // marked 渲染 markdown
  let html = marked.parse(text);

  // 还原 LaTeX — 用 KaTeX 直接渲染为 HTML
  html = html.replace(/%%MATH(\d+)%%/g, (m, i) => {
    const item = placeholders[parseInt(i)];
    if (!item) return m;
    try {
      return katex.renderToString(item.tex, {
        displayMode: item.display,
        throwOnError: false,
      });
    } catch (e) {
      return item.tex;
    }
  });

  return html;
}

// ════════════════════════════════════════════════════════════════
// Clerk 初始化
// ════════════════════════════════════════════════════════════════
window.addEventListener('load', async () => {
  try {
    await window.Clerk.load();
    clerkInstance = window.Clerk;
    clerkInstance.addListener(({ user }) => {
      if (user && !isSignedIn) onSignedIn();
      else if (!user && isSignedIn) onSignedOut();
    });
    if (clerkInstance.user) await onSignedIn();
    else showLogin();
  } catch (e) {
    console.error('Clerk init fail:', e);
    if (DOM.emptyHint) DOM.emptyHint.textContent = 'Clerk 加载失败，请刷新页面重试';
  }
});

function showLogin() {
  DOM.loginOverlay.classList.remove('hidden');
  if (!loginMounted) { clerkInstance.mountSignIn(DOM.clerkSignIn); loginMounted = true; }
}
function hideLogin() {
  DOM.loginOverlay.classList.add('hidden');
  if (loginMounted) { clerkInstance.unmountSignIn(DOM.clerkSignIn); loginMounted = false; }
}

async function onSignedIn() {
  if (authProcessing || isSignedIn) return;
  authProcessing = true; isSignedIn = true;
  try {
    const session = clerkInstance.session;
    if (session) authToken = await session.getToken();
    currentUser = clerkInstance.user;
    hideLogin(); renderUserInfo(); enableInput();
    await loadConversations();
    if (conversations.length === 0) await createConversation();
    else if (!activeConvId) await selectConversation(conversations[0].id);
  } finally { authProcessing = false; }
}

function onSignedOut() {
  if (!isSignedIn) return;
  isSignedIn = false; authProcessing = false;
  authToken = null; currentUser = null;
  conversations = []; activeConvId = null;
  DOM.convList.innerHTML = '';
  DOM.messages.innerHTML = '<div class="empty-hint">请登录后使用</div>';
  DOM.mainTitle.textContent = 'AI 聊天助手';
  disableInput(); DOM.sidebarFooter.innerHTML = '';
  showLogin();
}

// ════════════════════════════════════════════════════════════════
// API
// ════════════════════════════════════════════════════════════════
async function refreshToken() {
  if (clerkInstance && clerkInstance.session) authToken = await clerkInstance.session.getToken();
}
async function api(path, opts = {}) {
  await refreshToken();
  return fetch(path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}`, ...(opts.headers || {}) },
  });
}

// ════════════════════════════════════════════════════════════════
// 对话列表
// ════════════════════════════════════════════════════════════════
async function loadConversations() {
  try {
    const res = await api('/api/conversations');
    if (!res.ok) throw new Error('fail');
    const data = await res.json();
    conversations = Array.isArray(data) ? data : [];
    renderConvList();
  } catch (e) { console.error('load conv fail:', e); }
}

function renderConvList() {
  DOM.convList.innerHTML = '';
  if (conversations.length === 0) {
    DOM.convList.innerHTML = '<div style="padding:20px;text-align:center;color:#666;font-size:13px;">暂无对话</div>';
    return;
  }
  conversations.forEach(c => {
    const div = document.createElement('div');
    div.className = 'conv-item' + (c.id === activeConvId ? ' active' : '');
    div.innerHTML = `<span class="conv-title">${escHtml(c.title)}</span><button class="conv-del" title="删除">&times;</button>`;
    div.querySelector('.conv-title').onclick = () => selectConversation(c.id);
    div.querySelector('.conv-del').onclick = (e) => { e.stopPropagation(); deleteConversation(c.id); };
    DOM.convList.appendChild(div);
  });
}

async function selectConversation(id) {
  activeConvId = id;
  renderConvList(); enableInput();
  const conv = conversations.find(c => c.id === id);
  DOM.mainTitle.textContent = conv ? conv.title : 'AI 聊天助手';
  await loadMessages(id);
  closeMobileSidebar();
}

async function loadMessages(convId) {
  DOM.messages.innerHTML = '';
  try {
    const res = await api(`/api/conversations/${convId}/messages`);
    if (!res.ok) { DOM.messages.innerHTML = '<div class="empty-hint">加载消息失败</div>'; return; }
    const msgs = await res.json();
    if (!Array.isArray(msgs) || msgs.length === 0) {
      DOM.messages.innerHTML = '<div class="empty-hint" id="emptyHint">发送一条消息开始对话吧</div>';
      return;
    }
    msgs.forEach(m => appendMessage(m.role, m.content, m.reasoning_content));
    scrollToBottom();
  } catch (e) { console.error('load msg fail:', e); }
}

async function createConversation() {
  try {
    const res = await api('/api/conversations', { method: 'POST' });
    const conv = await res.json();
    conversations.unshift(conv);
    await selectConversation(conv.id);
  } catch (e) { console.error('create conv fail:', e); }
}

async function deleteConversation(id) {
  try {
    await api(`/api/conversations/${id}`, { method: 'DELETE' });
    conversations = conversations.filter(c => c.id !== id);
    if (activeConvId === id) {
      activeConvId = null;
      DOM.messages.innerHTML = '<div class="empty-hint" id="emptyHint">选择或新建一个对话开始聊天</div>';
      DOM.mainTitle.textContent = 'AI 聊天助手';
      disableInput();
    }
    renderConvList();
  } catch (e) { console.error('del conv fail:', e); }
}

// ════════════════════════════════════════════════════════════════
// 流式发送消息
// ════════════════════════════════════════════════════════════════
async function sendMessage() {
  const text = DOM.inputBox.value.trim();
  if (!text || !activeConvId || isSending) return;

  isSending = true;
  DOM.btnSend.disabled = true;
  DOM.inputBox.value = '';
  autoResize();

  const hint = DOM.messages.querySelector('.empty-hint');
  if (hint) hint.remove();

  // 用户消息
  appendMessage('user', text);
  scrollToBottom();

  // AI 回复容器
  const group = document.createElement('div');
  group.className = 'msg-group';

  let thinkingBlock = null;
  let thinkingContent = null;
  let contentDiv = document.createElement('div');
  contentDiv.className = 'msg-assistant streaming-cursor';

  if (thinkingEnabled) {
    thinkingBlock = document.createElement('div');
    thinkingBlock.className = 'thinking-block';
    thinkingBlock.innerHTML = '<div class="thinking-label"><span class="arrow">&#9654;</span> 思考过程</div><div class="thinking-content"></div>';
    thinkingContent = thinkingBlock.querySelector('.thinking-content');
    thinkingBlock.querySelector('.thinking-label').onclick = function() {
      thinkingBlock.classList.toggle('collapsed');
    };
    group.appendChild(thinkingBlock);
  }

  group.appendChild(contentDiv);
  DOM.messages.appendChild(group);
  scrollToBottom();

  let fullContent = '';
  let fullReasoning = '';

  try {
    await refreshToken();
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` },
      body: JSON.stringify({ conversation_id: activeConvId, message: text, thinking: thinkingEnabled }),
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      contentDiv.classList.remove('streaming-cursor');
      contentDiv.textContent = errData.message || '请求失败';
      isSending = false; DOM.btnSend.disabled = false;
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const dataStr = line.slice(6);
        if (dataStr.trim() === '[DONE]') continue;

        try {
          const evt = JSON.parse(dataStr);

          if (evt.type === 'reasoning' && thinkingContent) {
            fullReasoning += evt.content;
            thinkingContent.textContent = fullReasoning;
            scrollToBottom();
          }

          if (evt.type === 'content') {
            fullContent += evt.content;
            contentDiv.innerHTML = renderMarkdownWithLatex(fullContent);
            scrollToBottom();
          }

          if (evt.type === 'error') {
            contentDiv.textContent = evt.content;
          }

          if (evt.type === 'done') {
            contentDiv.classList.remove('streaming-cursor');
            // 无思考内容时移除思考块；有内容时默认折叠
            if (thinkingBlock && !fullReasoning) {
              thinkingBlock.remove();
            } else if (thinkingBlock && fullReasoning) {
              thinkingBlock.classList.add('collapsed');
            }
          }
        } catch (e) { /* skip */ }
      }
    }

    contentDiv.classList.remove('streaming-cursor');
    if (fullContent) {
      contentDiv.innerHTML = renderMarkdownWithLatex(fullContent);
    }

    await loadConversations();
    renderConvList();

  } catch (e) {
    contentDiv.classList.remove('streaming-cursor');
    contentDiv.textContent = '网络错误: ' + e.message;
  }

  isSending = false;
  DOM.btnSend.disabled = false;
  DOM.inputBox.focus();
  scrollToBottom();
}

// ════════════════════════════════════════════════════════════════
// DOM 操作
// ════════════════════════════════════════════════════════════════
function appendMessage(role, content, reasoning) {
  if (role === 'user') {
    const div = document.createElement('div');
    div.className = 'msg-user';
    div.textContent = content;
    DOM.messages.appendChild(div);
  } else {
    const group = document.createElement('div');
    group.className = 'msg-group';

    // 历史消息中的思考过程 — 默认折叠隐藏
    if (reasoning) {
      const tb = document.createElement('div');
      tb.className = 'thinking-block collapsed';
      tb.innerHTML = `<div class="thinking-label"><span class="arrow">&#9654;</span> 思考过程</div><div class="thinking-content">${escHtml(reasoning)}</div>`;
      tb.querySelector('.thinking-label').onclick = function() {
        tb.classList.toggle('collapsed');
      };
      group.appendChild(tb);
    }

    const div = document.createElement('div');
    div.className = 'msg-assistant';
    div.innerHTML = renderMarkdownWithLatex(content || '');
    group.appendChild(div);
    DOM.messages.appendChild(group);
  }
}

function scrollToBottom() {
  requestAnimationFrame(() => { DOM.messagesWrapper.scrollTop = DOM.messagesWrapper.scrollHeight; });
}

function renderUserInfo() {
  if (!currentUser) return;
  const name = currentUser.firstName || currentUser.username ||
    (currentUser.emailAddresses?.[0]?.emailAddress) || '用户';
  const email = currentUser.emailAddresses?.[0]?.emailAddress || '';
  const avatar = currentUser.imageUrl;

  DOM.sidebarFooter.innerHTML = `
    <div class="user-panel" id="userPanel">
      <div class="user-panel-header">
        ${avatar ? `<img src="${avatar}" alt="avatar">` : ''}
        <div>
          <div class="panel-user-name">${escHtml(name)}</div>
          ${email ? `<div class="panel-user-email">${escHtml(email)}</div>` : ''}
        </div>
      </div>
      <div class="user-panel-actions">
        <button id="btnPanelProfile">管理账号</button>
        <button id="btnPanelLogout">退出登录</button>
      </div>
    </div>
    <div class="user-info" id="userInfoTrigger">
      ${avatar ? `<img src="${avatar}" alt="avatar">` : ''}
      <span class="user-name">${escHtml(name)}</span>
    </div>
  `;

  $('userInfoTrigger').onclick = (e) => {
    e.stopPropagation(); $('userPanel').classList.toggle('show');
  };
  $('userPanel').onclick = (e) => e.stopPropagation();
  $('btnPanelProfile').onclick = () => {
    closeUserPanel();
    if (clerkInstance?.openUserProfile) clerkInstance.openUserProfile();
  };
  $('btnPanelLogout').onclick = () => { closeUserPanel(); clerkInstance.signOut(); };
}

function closeUserPanel() { const p = $('userPanel'); if (p) p.classList.remove('show'); }
document.addEventListener('click', () => closeUserPanel());

function enableInput() {
  if (activeConvId) { DOM.inputBox.disabled = false; DOM.btnSend.disabled = false; }
}
function disableInput() { DOM.inputBox.disabled = true; DOM.btnSend.disabled = true; }

function autoResize() {
  DOM.inputBox.style.height = 'auto';
  DOM.inputBox.style.height = Math.min(DOM.inputBox.scrollHeight, 150) + 'px';
}

function escHtml(s) {
  if (!s) return '';
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

// ════════════════════════════════════════════════════════════════
// 侧边栏收起/展开
// ════════════════════════════════════════════════════════════════
function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed;
  DOM.sidebar.classList.toggle('collapsed', sidebarCollapsed);
}

// ════════════════════════════════════════════════════════════════
// 搜索
// ════════════════════════════════════════════════════════════════
let searchTimer = null;

function openSearch() {
  DOM.searchModal.classList.remove('hidden');
  DOM.searchModalInput.value = '';
  DOM.searchResults.innerHTML = '<div class="search-empty">输入关键词搜索对话</div>';
  setTimeout(() => DOM.searchModalInput.focus(), 50);
}

function closeSearch() { DOM.searchModal.classList.add('hidden'); }

async function doSearch(query) {
  if (!query.trim()) {
    DOM.searchResults.innerHTML = '<div class="search-empty">输入关键词搜索对话</div>';
    return;
  }
  try {
    const res = await api(`/api/conversations/search?q=${encodeURIComponent(query)}`);
    const data = await res.json();
    if (!Array.isArray(data) || data.length === 0) {
      DOM.searchResults.innerHTML = '<div class="search-empty">未找到相关对话</div>';
      return;
    }
    DOM.searchResults.innerHTML = '';
    data.forEach(c => {
      const div = document.createElement('div');
      div.className = 'search-result-item';
      div.textContent = c.title;
      div.onclick = () => { closeSearch(); selectConversation(c.id); };
      DOM.searchResults.appendChild(div);
    });
  } catch (e) {
    DOM.searchResults.innerHTML = '<div class="search-empty">搜索失败</div>';
  }
}

// ════════════════════════════════════════════════════════════════
// 移动端侧边栏
// ════════════════════════════════════════════════════════════════
function openMobileSidebar() {
  DOM.sidebar.classList.add('mobile-open');
  DOM.mobileOverlay.classList.remove('hidden');
}
function closeMobileSidebar() {
  DOM.sidebar.classList.remove('mobile-open');
  DOM.mobileOverlay.classList.add('hidden');
}

// ════════════════════════════════════════════════════════════════
// 事件绑定
// ════════════════════════════════════════════════════════════════
DOM.btnNew.onclick = createConversation;
DOM.btnSend.onclick = sendMessage;
DOM.mobileOverlay.onclick = closeMobileSidebar;
DOM.btnToggleSidebar.onclick = () => {
  if (window.innerWidth <= 768) openMobileSidebar();
  else toggleSidebar();
};
DOM.btnSearchTop.onclick = openSearch;

DOM.btnThink.onclick = () => {
  thinkingEnabled = !thinkingEnabled;
  DOM.btnThink.classList.toggle('active', thinkingEnabled);
};

DOM.inputBox.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
DOM.inputBox.addEventListener('input', autoResize);

// 搜索模态框
DOM.searchModal.onclick = (e) => { if (e.target === DOM.searchModal) closeSearch(); };
DOM.searchModalInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => doSearch(DOM.searchModalInput.value), 300);
});
DOM.searchModalInput.addEventListener('keydown', e => { if (e.key === 'Escape') closeSearch(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && !DOM.searchModal.classList.contains('hidden')) closeSearch();
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openSearch(); }
});
</script>
